<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checker Plus for Outlook</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="header-title">
      <img src="icons/icon16.png" alt="" class="header-icon" />
      <span>Checker Plus for Outlook</span>
    </div>
    <div class="header-actions">
      <button id="btn-refresh-all" class="btn-icon" title="Refresh all accounts">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5a5.5 5.5 0 0 1 3.89 1.61L13.5 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13.5 2v3.5H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="btn-add-account" class="btn-icon" title="Add account">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="main">
    <div id="loading" class="state-message">
      <div class="spinner"></div>
      <span>Loading…</span>
    </div>

    <div id="empty" class="state-message hidden">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect x="4" y="8" width="32" height="24" rx="3" stroke="#c8c6c4" stroke-width="2"/>
        <path d="M4 11l16 10 16-10" stroke="#c8c6c4" stroke-width="2"/>
      </svg>
      <p>No accounts added yet.</p>
      <button id="btn-add-first" class="btn-primary">Add your first account</button>
    </div>

    <div id="accounts-list"></div>

    <!-- Email detail view -->
    <div id="email-detail" class="hidden">
      <div id="detail-header">
        <button id="btn-back" class="btn-icon" title="Back">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div id="detail-meta">
          <div id="detail-subject"></div>
          <div id="detail-from"></div>
          <div id="detail-date"></div>
        </div>
        <div id="detail-header-actions"></div>
      </div>
      <div id="detail-body-wrap">
        <div id="detail-loading" class="state-message hidden"><div class="spinner"></div><span>Loading…</span></div>
        <iframe id="detail-iframe" sandbox="allow-same-origin" title="Email body"></iframe>
      </div>
      <div id="detail-footer">
        <a id="btn-open-outlook" class="detail-compose-btn" target="_blank">Open in Outlook for more actions</a>
      </div>
    </div>
  </main>

  <script type="module" src="popup.js"></script>
</body>
</html>
